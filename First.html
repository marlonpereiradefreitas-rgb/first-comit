
<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
     <title>formulário</title>
</head>
<body>

     <h1>Cadastro</h1>

     <form id="formulário" method="POST">
    
        <label>Nome:</label>
        <input type="text" name="nome" id="nome"><br><br>

        <label>Idade</label>
        <input type="number" name="idade" id="idade"><br><br>

        <label>Cidade</label>
        <input type="text" name="cidade" id="cidade"><br><br>

        <label>Senha</label>
        <input type="text" name="senha" id="senha"><br><br>

        <label>CPF</label>
        <input type="text" name="CPF" id="CPF"><br><br>

        <label>SUS</label>
        <input type="text" name="SUS" id="SUS"><br><br>

        <button type="submit">Enviar</button>
     </form>
</body>
</html>

<style>
    body{
        background-color: linear-gradient(135deg, #1e3c73, #2a5298);
        font-family: Arial, sans-self;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

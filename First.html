<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
     <title>formulário</title>
</head>
<body>

     <h1>Cadastro</h1>

     <form id="formulário" method="POST">
    
        <label>Nome:</label>
        <input type="text" name="nome" id="nome"><br><br>

        <label>Idade</label>
        <input type="number" name="idade" id="idade"><br><br>

        <label>Cidade</label>
        <input type="text" name="cidade" id="cidade"><br><br>

        <label>E-mail</label>
        <input type="text" name="E-mail" id="E-mail"><br><br>

        <label>Telefone</label>
        <input type="number" name="Telefone" id="Telefone"><br><br>

        <button type="submit">Enviar</button>
     </form>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema ESF</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f0f0f0;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:16px;
    }

    .container{
      width:720px;
      height:510px;
      background:#dcdcdc;
      position:relative;
      overflow:hidden;
      border:1px solid #cfcfcf;
    }

    /* TOPO */
    .topbar{
      width:100%;
      height:84px;
      background:linear-gradient(to right,#1d2341,#5b95e6);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      position:relative;
    }

    .logo-left{
      width:70px;
      height:55px;
      background:#163b70;
      border-radius:2px;
      position:relative;
      border:1px solid rgba(255,255,255,.4);
    }

    .logo-left::before{
      content:"";
      position:absolute;
      left:8px;
      top:8px;
      width:28px;
      height:28px;
      border:2px solid #7fd0ff;
      border-radius:2px;
      box-shadow:
        6px -6px 0 0 rgba(127,208,255,.8),
        12px -12px 0 0 rgba(127,208,255,.5);
    }

    .logo-left::after{
      content:"";
      position:absolute;
      right:8px;
      bottom:6px;
      width:26px;
      height:26px;
      background:#ffb400;
      clip-path:polygon(50% 0%, 100% 40%, 100% 100%, 0 100%, 0 40%);
    }

    .title{
      position:absolute;
      left:200px;
      color:white;
      font-size:62px;
      font-family:Georgia, 'Times New Roman', serif;
      font-weight:normal;
    }

    .sus{
      color:#000;
      font-weight:bold;
      font-size:20px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .cross{
      width:42px;
      height:42px;
      position:relative;
    }

    .cross::before,
    .cross::after{
      content:"";
      position:absolute;
      background:#000;
    }

    .cross::before{
      width:14px;
      height:42px;
      left:14px;
    }

    .cross::after{
      width:42px;
      height:14px;
      top:14px;
    }

    /* LATERAL */
    .sidebar{
      width:138px;
      height:100%;
      background:linear-gradient(to bottom,#222844,#5ca0ff);
      position:absolute;
      left:0;
      top:84px;
    }

    /* ÁREA CENTRAL */
    .content{
      margin-left:138px;
      height:calc(100% - 84px);
      background:#e5e5e5;
      padding-top:32px;
      display:flex;
      justify-content:center;
    }

    .login-box{
      width:305px;
      height:380px;
      border:3px solid #1e90ff;
      border-radius:12px;
      background:#ececec;
      padding:18px;
      position:relative;
    }

    .login-title{
      width:180px;
      margin:0 auto 54px;
      border:1px solid #555;
      text-align:center;
      font-size:16px;
      font-weight:bold;
      font-style:italic;
      background:#f3f3f3;
    }

    form{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    input[type="email"],
    input[type="password"]{
      width:162px;
      height:18px;
      margin-bottom:18px;
      border:1px solid #444;
      border-radius:4px;
      padding:2px 6px;
      font-size:10px;
      background:white;
    }

    .remember{
      width:162px;
      font-size:11px;
      margin-top:-10px;
      margin-bottom:20px;
      color:#333;
    }

    .btn{
      width:140px;
      height:34px;
      border:none;
      border-radius:5px;
      background:linear-gradient(to bottom,#5ea5ff,#2f76cf);
      color:#111;
      font-size:30px;
      line-height:34px;
      cursor:pointer;
      box-shadow:0 1px 2px rgba(0,0,0,.4);
    }

    .btn span{
      font-size:18px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">

      <div class="logo-left"></div>

      <h1 class="title">Sistema ESF</h1>

      <div class="sus">
        SUS
        <div class="cross"></div>
      </div>

    </div>

    <div class="sidebar"></div>

    <div class="content">

      <div class="login-box">

        <div class="login-title">Login</div>

        <form>

          <input type="email" placeholder="E-mail">

          <input type="password" placeholder="Senha">

          <label class="remember">
            <input type="checkbox">
            Lembrar de mim
          </label>

          <button class="btn">
            <span>Entrar</span>
          </button>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
